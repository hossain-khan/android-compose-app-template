name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  android-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Java JDK versions (LTS: 21 & Non-LTS: 23) - Metro 0.12.0+ requires JDK 21+
        java-version: [ '21', '23' ]
        # https://adoptium.net/temurin/releases/
        distribution: [ 'temurin' ]

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check file changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - 'app/**'
              - 'gradle/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
              - 'keystore/**'
              - 'setup-project.sh'
              - 'setup-android-env.sh'
              - '.github/workflows/android.yml'
              - '.github/workflows/android-lint.yml'

      - name: set up JDK
        if: steps.filter.outputs.src == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: ${{ matrix.distribution }}

      # Automatic gradle caching using `actions/cache@v4`
      # https://github.com/gradle/actions/tree/main/setup-gradle
      - name: Setup Gradle
        if: steps.filter.outputs.src == 'true'
        uses: gradle/actions/setup-gradle@v6

      - name: Run test
        if: steps.filter.outputs.src == 'true'
        run: ./gradlew testDebugUnitTest --parallel --daemon

      - name: Build with Gradle
        if: steps.filter.outputs.src == 'true'
        run: ./gradlew lintKotlin assembleDebug --parallel --daemon
