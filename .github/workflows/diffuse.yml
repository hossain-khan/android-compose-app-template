name: APK Size Analysis with Diffuse

on:
  pull_request:
    branches: [ "main" ]
    # No path filters - this is a required check and must always run
    # We'll check changed files within the job and skip heavy work if needed

jobs:
  diffuse:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # Required to post comments

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Need full history to detect changed files

      - name: Check file changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - '**/*.kt'
              - '**/*.kts'
              - '**/gradle.properties'
              - '**/libs.versions.toml'
              - '**/*.pro'
              - '**/AndroidManifest.xml'
              - '**/res/**'
              - '**/assets/**'

      - name: Skip analysis notification
        if: steps.filter.outputs.src != 'true'
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 📊 APK Size Analysis

            ⏭️ Skipped - No files that affect APK size were changed in this PR.

            This workflow runs for changes to: Kotlin files, Gradle configuration, resources, manifests, and assets.

            ---
            _Generated by [Diffuse](https://github.com/JakeWharton/diffuse) via [diffuse-action](https://github.com/usefulness/diffuse-action)_

      - name: Set up JDK
        if: steps.filter.outputs.src == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        if: steps.filter.outputs.src == 'true'
        uses: gradle/actions/setup-gradle@v6

      # Build base branch APK first so that both APKs are built with the same process
      - name: Build base branch APK
        if: steps.filter.outputs.src == 'true'
        run: |
          git fetch origin ${{ github.base_ref }}
          git checkout origin/${{ github.base_ref }}
          ./gradlew assembleRelease --parallel --daemon
          cp app/build/outputs/apk/release/app-release.apk base.apk
          echo "Base APK ($(git rev-parse --short HEAD)) size: $(du -sh base.apk | cut -f1)"

      # Build PR APK (switch back to the PR merge commit)
      - name: Build PR APK
        if: steps.filter.outputs.src == 'true'
        run: |
          git checkout ${{ github.sha }}
          ./gradlew assembleRelease --parallel --daemon
          echo "PR APK size: $(du -sh app/build/outputs/apk/release/app-release.apk | cut -f1)"

      - name: List APK outputs
        if: steps.filter.outputs.src == 'true'
        run: |
          echo "Listing APK outputs:"
          find app/build/outputs/apk -name "*.apk"
          echo "Base APK: $(ls -la base.apk)"

      # Run Diffuse comparison using the action
      - name: Run Diffuse
        if: steps.filter.outputs.src == 'true'
        id: diffuse
        uses: usefulness/diffuse-action@v1
        continue-on-error: true
        with:
          old-file-path: base.apk
          new-file-path: app/build/outputs/apk/release/app-release.apk

      # Post or update comment on PR
      - name: Find existing Diffuse comment
        if: steps.filter.outputs.src == 'true'
        uses: peter-evans/find-comment@v4
        id: find_comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: '📊 APK Size Analysis'

      - name: Create or update PR comment
        if: steps.filter.outputs.src == 'true'
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## 📊 APK Size Analysis

            Comparing `${{ github.base_ref }}` (base branch) → `${{ github.head_ref }}` (this PR)

            ${{ steps.diffuse.outputs.diff-gh-comment || '⚠️ Diffuse analysis failed. Check the workflow logs for details.' }}

            ---
            _Generated by [Diffuse](https://github.com/JakeWharton/diffuse) via [diffuse-action](https://github.com/usefulness/diffuse-action)_

      # Upload APKs as artifacts for manual inspection
      - name: Upload APKs
        if: steps.filter.outputs.src == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: apks-comparison
          path: |
            base.apk
            app/build/outputs/apk/release/app-release.apk
          retention-days: 7
